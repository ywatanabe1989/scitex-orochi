name: release-ci

# Post-merge validation gate. Runs on push to protected branches
# (main, develop) and as the canonical scheduled run. Always uses the
# FULL pytest matrix — no conditional skipping — so the protected-branch
# history is exercised on every supported Python.
#
# L1 concurrency — coalesce overlapping pushes on the same branch.
# L5a uv-managed Python (`uv python install` + `uv venv --python`) so each
#     matrix leg pins its interpreter independently of the runner.
# L5b .venv/bin on PATH so console scripts resolve without `uv run`.

on:
  push:
    branches: [main, develop]
  schedule:
    - cron: "0 7 * * *"  # nightly 07:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tests:
    name: pytest-matrix-on-ubuntu-py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Set up Python ${{ matrix.python-version }} (uv-managed)
        run: uv python install ${{ matrix.python-version }}
      - name: Create uv venv on this matrix Python
        run: uv venv --python ${{ matrix.python-version }} .venv
      - name: Install dependencies
        run: |
          uv pip install --python .venv/bin/python -e ".[all,dev]" \
            || uv pip install --python .venv/bin/python -e ".[dev]" \
            || uv pip install --python .venv/bin/python -e .
      - name: Run tests
        run: |
          export PATH="$PWD/.venv/bin:$PATH"
          .venv/bin/pytest tests/ --cov=src/scitex_orochi --cov-report=xml --cov-report=term
      - name: Upload coverage to Codecov
        if: always() && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  import-smoke:
    name: import-smoke-on-ubuntu-py3-12
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Set up Python 3.12 (uv-managed)
        run: uv python install 3.12
      - name: Install (no extras) in uv venv
        run: |
          uv venv --python 3.12 .venv
          uv pip install --python .venv/bin/python -e .
      - name: Import smoke
        run: .venv/bin/python -c "import scitex_orochi; print(getattr(scitex_orochi, '__version__', 'unversioned'))"

  audit:
    name: audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Set up Python 3.12 (uv-managed)
        run: uv python install 3.12
      - name: Install package + audit tooling
        run: |
          uv venv --python 3.12 .venv
          uv pip install --python .venv/bin/python -e ".[dev]"
          uv pip install --python .venv/bin/python "scitex-dev[cli-audit]"
      # Run the package's canonical audit gate, NOT raw `audit-all`.
      #
      # `tests/develop/test_audit.py::test_audit_all_clean` calls
      # `scitex_dev.testing.audit_all_for_package("scitex-orochi",
      # skip_rules=(...))` — the single source of truth for which audit
      # rules this package has formally deferred (the CLI/MCP noun-verb
      # migration §1/§1a/§1d/§2/§4/§5/§6/§6b/§10 and the PA-306/307
      # test-hygiene backlog, each masked with a documented rationale,
      # exactly as scitex-hub / scitex-io / scitex-cloud do).
      #
      # Raw `scitex-dev ecosystem audit-all scitex-orochi` bypasses that
      # mask AND cannot load `.scitex/dev/config.yaml`'s `deferred`
      # opt-out on the runner (the per-package auditors resolve their
      # config repo-root from the ECOSYSTEM registry's dev-box
      # `local_path`, which is absent in CI), so it re-fires ~828
      # already-deferred findings. Running the gate test keeps the audit
      # signal honest without the false reds. See PR #436.
      - name: Run audit conformance gate
        run: |
          export PATH="$PWD/.venv/bin:$PATH"
          .venv/bin/pytest tests/develop/test_audit.py -v
