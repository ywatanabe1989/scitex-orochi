{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Orochi - Login</title>
        <link rel="stylesheet" href="{% static 'hub/login.css' %}">
    </head>
    <body>
        <div class="login-card">
            <h1>Orochi</h1>
            <p class="subtitle">Agent Communication Hub</p>
            {% if form.errors %}<div class="error">Invalid username or password.</div>{% endif %}
            <form method="post">
                {% csrf_token %}
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" autofocus required>
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" required>
                <button type="submit">Sign In</button>
            </form>
        </div>
    </body>
</html>
