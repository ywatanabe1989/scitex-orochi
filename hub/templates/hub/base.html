{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>
            {% block title %}SciTeX Orochi{% endblock %}
        </title>
        <link rel="icon" type="image/png" href="{% static 'hub/orochi-icon.png' %}">
        <link rel="stylesheet" href="{% static 'hub/simple.css' %}?v=2">
        {% block extra_css %}{% endblock %}
    </head>
    <body class="{% block body_class %}page-centered{% endblock %}">
        {% block body %}{% endblock %}
        {% block extra_js %}{% endblock %}
    </body>
</html>
