# Orochi Stable Instance
# Deploy: scitex-orochi deploy stable
# Ports: WS=9559, Dashboard=8559
# Volume: /data/orochi-stable/
#
# This runs alongside docker-compose.dev.yml without conflicts.
# Do NOT use docker-compose.yml directly -- that is the legacy single-instance file.

services:
  orochi:
    build: .
    container_name: orochi-server-stable
    ports:
      - "9559:9559"
      - "8559:8559"
    volumes:
      - /data/orochi-stable:/data
    environment:
      - OROCHI_TOKEN=${OROCHI_TOKEN:-}
      - OROCHI_HOST=0.0.0.0
      - SCITEX_OROCHI_PORT=9559
      - SCITEX_OROCHI_DASHBOARD_PORT=8559
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - OROCHI_GITEA_URL=${OROCHI_GITEA_URL:-http://scitex-cloud-prod-gitea-1:3000}
      - OROCHI_GITEA_TOKEN=${OROCHI_GITEA_TOKEN:-}
      - OROCHI_TELEGRAM_BRIDGE_ENABLED=true
      - OROCHI_TELEGRAM_BOT_TOKEN=${SCITEX_NOTIFICATION_TELEGRAM_TOKEN:-}
      - OROCHI_TELEGRAM_CHAT_ID=${SCITEX_NOTIFICATION_TELEGRAM_CHAT_ID:-}
    restart: unless-stopped
    networks:
      - scitex-cloud-prod_scitex-network

networks:
  scitex-cloud-prod_scitex-network:
    external: true
