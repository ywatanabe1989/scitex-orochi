<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Orochi Dashboard</title>
        <link rel="stylesheet" href="/static/style.css?v=18">
    </head>
    <body>
        <header>
            <img src="/static/orochi-icon.png" alt="Orochi" class="header-icon">
            <h1>Orochi</h1>
            <span id="conn-status" class="status">disconnected</span>
        </header>
        <div class="container">
            <div class="sidebar">
                <h2>Agents</h2>
                <div id="agents">
                    <p id="no-agents">No agents connected</p>
                </div>
                <h2 class="channels-heading">Channels</h2>
                <div id="channels"></div>
            </div>
            <div class="main">
                <div id="task-panel" class="task-panel">
                    <div class="task-panel-header" id="task-panel-toggle">
                        <span>Agent Tasks</span>
                        <span id="task-panel-arrow" class="task-panel-arrow">&#9660;</span>
                    </div>
                    <div id="task-panel-body" class="task-panel-body">
                        <div id="task-cards" class="task-cards"></div>
                    </div>
                </div>
                <div id="messages" class="messages"></div>
                <div class="input-bar">
                    <div id="mention-dropdown" class="mention-dropdown"></div>
                    <textarea id="msg-input"
                              placeholder="Type a message... (Shift+Enter for newline)"
                              autocomplete="off"
                              rows="1"></textarea>
                    <input type="file" id="file-input" style="display:none" accept="image/*,.pdf,.txt,.csv,.json,.zip">
                    <button id="msg-attach" title="Attach file">&#128206;</button>
                    <button id="msg-send">Send</button>
                </div>
                <div class="stats-bar">
                    <span>Agents: <span id="stat-agents">0</span></span>
                    <span>Channels: <span id="stat-channels">0</span></span>
                    <span>Observers: <span id="stat-observers">0</span></span>
                </div>
            </div>
        </div>
        <script src="/static/app.js?v=18"></script>
    </body>
</html>
