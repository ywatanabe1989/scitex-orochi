<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Orochi Dashboard</title>
        <link rel="stylesheet" href="/static/style.css?v=29">
    </head>
    <body>
        <div class="container">
            <div class="sidebar">
                <div class="sidebar-brand">
                    <img src="/static/orochi-icon.png" alt="Orochi" class="header-icon">
                    <span class="brand-name">Orochi</span>
                    <span id="conn-status" class="status">disconnected</span>
                </div>
                <h2 class="collapsible-heading channels-heading">Agents</h2>
                <div id="agents" class="sidebar-section">
                    <p id="no-agents">No agents connected</p>
                </div>
                <h2 class="collapsible-heading channels-heading">Channels</h2>
                <div id="channels" class="sidebar-section"></div>
                <h2 class="collapsible-heading channels-heading">Resources</h2>
                <div id="resources" class="sidebar-section"></div>
            </div>
            <div class="main">
                <div class="tab-bar">
                    <button class="tab-btn active" data-tab="chat">Chat</button>
                    <button class="tab-btn" data-tab="todo">TODO</button>
                    <button class="tab-btn" data-tab="agents-tab">Agents</button>
                    <button class="tab-btn" data-tab="resources">Resources</button>
                </div>
                <div id="messages" class="messages"></div>
                <div id="todo-view" class="todo-view" style="display:none">
                    <div id="todo-grid" class="todo-grid"></div>
                </div>
                <div id="agents-tab-view" class="todo-view" style="display:none">
                    <div id="agents-grid" class="todo-grid"></div>
                </div>
                <div id="resources-view" class="todo-view" style="display:none">
                    <div id="resources-grid" class="todo-grid"></div>
                </div>
                <div class="input-bar">
                    <div id="mention-dropdown" class="mention-dropdown"></div>
                    <textarea id="msg-input"
                              placeholder="Type a message... (Shift+Enter for newline, drag &amp; drop files)"
                              autocomplete="off"
                              rows="3"></textarea>
                    <input type="file" id="file-input" style="display:none">
                    <button id="msg-attach" title="Attach file">Attach</button>
                    <button id="msg-sketch" title="Draw sketch">Sketch</button>
                    <button id="msg-send">Send</button>
                </div>
                <div class="stats-bar">
                    <span>Agents: <span id="stat-agents">0</span></span>
                    <span>Channels: <span id="stat-channels">0</span></span>
                    <span>Observers: <span id="stat-observers">0</span></span>
                </div>
            </div>
        </div>
        <script src="/static/app.js?v=29"></script>
    </body>
</html>
