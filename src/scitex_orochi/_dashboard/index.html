<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, initial-scale=1.0, viewport-fit=cover">
        <title>Orochi Dashboard</title>
        <meta name="theme-color" content="#1a1a2e">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style"
              content="black-translucent">
        <link rel="manifest" href="/static/manifest.json">
        <link rel="apple-touch-icon" href="/static/orochi-icon.png">
        <link rel="stylesheet" href="/static/style.css?v=40">
        <link rel="stylesheet" href="/static/components.css?v=3">
        <link rel="stylesheet" href="/static/todo-tab.css?v=1">
        <link rel="stylesheet" href="/static/responsive.css?v=2">
        <link rel="stylesheet" href="/static/push.css?v=2">
    </head>
    <body>
        <div class="container">
            <button id="sidebar-toggle"
                    class="sidebar-toggle"
                    aria-label="Toggle sidebar">&#9776;</button>
            <div class="sidebar" id="sidebar">
                <div class="sidebar-brand">
                    <img src="/static/orochi-icon.png" alt="Orochi" class="header-icon">
                    <span class="brand-name">Orochi <span id="orochi-orochi_version" class="brand-orochi_version"></span></span>
                    <span id="conn-status" class="status">ws: offline</span>
                </div>
                <div class="filter-bar" style="position:relative">
                    <input type="text"
                           id="filter-input"
                           placeholder="Filter... (agent: host: channel: label: or text)"
                           autocomplete="off">
                    <div id="filter-suggest" class="filter-suggest"></div>
                    <div id="filter-tags" class="filter-tags"></div>
                </div>
                <h2 class="collapsible-heading channels-heading">Agents</h2>
                <div id="agents" class="sidebar-section">
                    <p id="no-agents">No agents connected</p>
                </div>
                <h2 class="collapsible-heading channels-heading">Channels</h2>
                <div id="channels" class="sidebar-section"></div>
                <h2 class="collapsible-heading channels-heading">Resources</h2>
                <div id="resources" class="sidebar-section"></div>
            </div>
            <div class="main">
                <div class="tab-bar">
                    <button class="tab-btn active" data-tab="chat">Chat</button>
                    <button class="tab-btn" data-tab="todo">TODO</button>
                    <button class="tab-btn" data-tab="agents-tab">Agents</button>
                    <button class="tab-btn" data-tab="resources">Resources</button>
                    <button class="tab-btn" data-tab="workspaces">Workspaces</button>
                </div>
                <div id="messages" class="messages"></div>
                <div id="todo-view" class="todo-view" style="display:none">
                    <div id="todo-grid" class="todo-grid"></div>
                </div>
                <div id="agents-tab-view" class="todo-view" style="display:none">
                    <div id="agents-grid" class="todo-grid"></div>
                </div>
                <div id="resources-view" class="todo-view" style="display:none">
                    <div id="resources-grid" class="todo-grid"></div>
                </div>
                <div id="workspaces-view" class="todo-view" style="display:none">
                    <div id="workspaces-grid" class="todo-grid"></div>
                </div>
                <div class="input-bar">
                    <div id="mention-dropdown" class="mention-dropdown"></div>
                    <textarea id="msg-input"
                              placeholder="Type a message..."
                              autocomplete="off"
                              rows="3"></textarea>
                    <input type="file" id="file-input" style="display:none">
                    <button id="msg-attach" title="Attach file">Attach</button>
                    <button id="msg-sketch" title="Draw sketch">Sketch</button>
                    <button id="msg-send">Send</button>
                </div>
                <div class="stats-bar">
                    <span>Agents: <span id="stat-agents">0</span></span>
                    <span>Channels: <span id="stat-channels">0</span></span>
                    <span>Observers: <span id="stat-observers">0</span></span>
                    <span id="stat-telegram" style="display:none">Telegram: <span id="stat-telegram-status">-</span></span>
                </div>
            </div>
        </div>
        <script src="/static/config.js?v=1"></script>
        <script src="/static/app.js?v=42"></script>
        <script src="/static/chat.js?v=1"></script>
        <script src="/static/mention.js?v=1"></script>
        <script src="/static/upload.js?v=1"></script>
        <script src="/static/sketch.js?v=1"></script>
        <script src="/static/resources-tab.js?v=1"></script>
        <script src="/static/todo-tab.js?v=1"></script>
        <script src="/static/workspaces-tab.js?v=1"></script>
        <script src="/static/agents-tab.js?v=2"></script>
        <script src="/static/tabs.js?v=1"></script>
        <script src="/static/filter.js?v=1"></script>
        <script src="/static/init.js?v=1"></script>
        <script src="/static/sw-register.js?v=1"></script>
        <script src="/static/push.js?v=1"></script>
    </body>
</html>
