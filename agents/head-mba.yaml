# Orochi Head Agent (MBA) -- agent-container definition
# Runs on MacBook Air for iOS/mobile development tasks
# Launched via: scitex-orochi launch head mba
apiVersion: cld-agent/v1
kind: Agent
metadata:
  name: head-mba
  labels:
    role: head
    team: orochi
    machine: mba
    capabilities: ios-simulator,xcode,swift,mobile-testing
spec:
  runtime: claude-code
  model: sonnet
  workdir: ~/proj

  remote:
    host: mba
    user: ywatanabe

  claude:
    flags:
      - --dangerously-skip-permissions
    session: new

  env:
    CLAUDE_AGENT_ROLE: worker
    CLAUDE_AGENT_ID: head-mba
    SCITEX_OROCHI_HOST: "192.168.0.102"
    SCITEX_OROCHI_PORT: "9559"

  screen:
    name: orochi-head-mba

  skills:
    required:
      - autonomous
      - quality-guards
    available:
      - scitex

  health:
    enabled: true
    interval: 30
    method: screen-alive

  restart:
    policy: on-failure
    max_retries: 3
