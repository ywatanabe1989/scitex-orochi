# Orochi Head Agent (MBA) -- agent-container definition
# Runs on MacBook Air for iOS/mobile development tasks
# Launched via: scitex-orochi launch head mba
apiVersion: cld-agent/v1
kind: Agent
metadata:
  name: orochi-head-mba
  labels:
    role: head
    team: orochi
    machine: mba
    capabilities: ios-simulator,xcode,swift,mobile-testing
spec:
  runtime: claude-code
  model: sonnet
  workdir: ~/proj

  remote:
    host: mba
    user: ywatanabe

  claude:
    channels: []
    flags:
      - --dangerously-skip-permissions
      - "--dangerously-load-development-channels server:scitex-orochi"
    session: continue

  orochi:
    enabled: true
    hosts:
      - 127.0.0.1            # MBA localhost (fastest, Orochi runs here)
      - 192.168.11.22        # MBA LAN
      - scitex-orochi.com    # domain (fallback)
    port: 8559
    token_env: SCITEX_OROCHI_TOKEN
    channels:
      - "#general"
    heartbeat_interval: 60

  env:
    CLAUDE_AGENT_ROLE: head
    CLAUDE_AGENT_ID: orochi-head-mba
    SCITEX_OROCHI_HOST: "192.168.0.102"
    SCITEX_OROCHI_PORT: "8559"

  screen:
    name: orochi-head-mba

  skills:
    required:
      - autonomous
      - quality-guards
    available:
      - scitex

  health:
    enabled: true
    interval: 30
    method: screen-alive

  restart:
    policy: on-failure
    max_retries: 3
