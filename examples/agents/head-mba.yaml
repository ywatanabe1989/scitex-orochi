# Template: copy to ~/.scitex/orochi/agents/ and customize
# Orochi Head Agent (MBA) -- agent-container definition
# Runs on MacBook Air for iOS/mobile development tasks
# Launched via: scitex-orochi launch head mba
apiVersion: cld-agent/v1
kind: Agent
metadata:
  name: orochi-head-mba
  labels:
    role: head
    team: orochi
    orochi_machine: CHANGEME
    capabilities: ios-simulator,xcode,swift,mobile-testing
spec:
  orochi_runtime: claude-code
  orochi_model: sonnet
  workdir: ~/proj

  remote:
    host: CHANGEME_HOST
    user: CHANGEME_USER

  claude:
    channels: []
    flags:
      - --dangerously-skip-permissions
      - "--dangerously-load-development-channels server:scitex-orochi"
    session: continue

  orochi:
    enabled: true
    hosts:
      - CHANGEME_LAN_IP      # LAN IP (fast)
      - CHANGEME_DOMAIN      # domain (fallback)
    port: 8559
    token_env: SCITEX_OROCHI_TOKEN
    channels:
      - "#general"
    heartbeat_interval: 60

  env:
    CLAUDE_AGENT_ROLE: head
    CLAUDE_AGENT_ID: orochi-head-mba
    SCITEX_OROCHI_HOST: "CHANGEME_HUB_IP"
    SCITEX_OROCHI_PORT: "8559"

  screen:
    name: orochi-head-mba

  skills:
    required:
      - autonomous
      - quality-guards
    available:
      - scitex

  health:
    enabled: true
    interval: 30
    method: multiplexer-orochi_alive

  restart:
    policy: on-failure
    max_retries: 3
