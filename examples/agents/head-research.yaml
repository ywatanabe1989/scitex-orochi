# Template: copy to ~/.scitex/orochi/agents/ and customize
# Orochi Head Agent (Research) -- agent-container definition
# Launched via: scitex-orochi launch head research
# Or explicitly: scitex-orochi launch head research --agent-config agents/head-research.yaml
#
# Note: Spartan's module loads make preflight slow (~60s).
# Use: scitex-agent-container start --no-preflight agents/head-research.yaml
apiVersion: cld-agent/v1
kind: Agent
metadata:
  name: orochi-head-research
  labels:
    role: head
    team: orochi
    specialty: research
    orochi_machine: CHANGEME
    capabilities: gpu,orochi_slurm,large-compute,ml-training
spec:
  orochi_runtime: claude-code
  orochi_model: opus[1m]
  workdir: ~/proj

  remote:
    host: CHANGEME_HOST
    user: CHANGEME_USER
    timeout: 120

  claude:
    channels: []
    flags:
      - --dangerously-skip-permissions
      - "--dangerously-load-development-channels server:scitex-orochi"
    session: continue

  orochi:
    enabled: true
    hosts:
      - CHANGEME_LAN_IP      # LAN IP (fast)
      - CHANGEME_DOMAIN      # domain (fallback)
    port: 8559
    token_env: SCITEX_OROCHI_TOKEN
    channels:
      - "#general"
      - "#research"
    heartbeat_interval: 60

  env:
    SCITEX_OROCHI_HOST: "CHANGEME_HUB_IP"
    SCITEX_OROCHI_PORT: "8559"
    SCITEX_OROCHI_AGENT: orochi-head-research  # matches metadata.name
    CLAUDE_AGENT_ROLE: head
    CLAUDE_AGENT_ID: orochi-head-research

  skills:
    required:
      - python-scitex   # Scientific computing skill
      - data-analysis   # Data analysis and visualization

  screen:
    name: orochi-head-research

  health:
    enabled: true
    interval: 60
    timeout: 5
    method: orochi_multiplexer-orochi_alive

  restart:
    policy: on-failure
    max_retries: 2
    backoff:
      initial: 60
      max: 600
      multiplier: 2

  hooks:
    pre_start: []
    post_start: []
    pre_stop: []
    post_stop: []
