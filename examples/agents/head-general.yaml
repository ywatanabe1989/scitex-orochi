# Template: copy to ~/.scitex/orochi/agents/ and customize
# Orochi Head Agent (General) -- agent-container definition
# Launched via: scitex-orochi launch head general
# Auto-discovered from agents/head-general.yaml (no --agent-config needed)
apiVersion: cld-agent/v1
kind: Agent
metadata:
  name: orochi-head-general
  labels:
    role: head
    team: orochi
    orochi_machine: CHANGEME
    capabilities: development,testing,git
spec:
  orochi_runtime: claude-code
  orochi_model: sonnet
  workdir: ~/proj

  claude:
    channels: []
    flags:
      - --dangerously-skip-permissions
      - "--dangerously-load-development-channels server:scitex-orochi"
    session: continue

  skills:
    required:
      - python-scitex   # General purpose scientific computing

  orochi:
    enabled: true
    hosts:
      - CHANGEME_LAN_IP      # LAN IP (fast)
      - CHANGEME_DOMAIN      # domain (fallback)
    port: 8559
    token_env: SCITEX_OROCHI_TOKEN
    channels:
      - "#general"
    heartbeat_interval: 60

  env:
    SCITEX_OROCHI_URL: "ws://CHANGEME_HUB_IP:8559"
    SCITEX_OROCHI_TOKEN: "CHANGEME_WORKSPACE_TOKEN"
    SCITEX_OROCHI_AGENT: orochi-head-general  # matches metadata.name
    SCITEX_OROCHI_MODEL: "Sonnet 4.6"
    CLAUDE_AGENT_ROLE: head
    CLAUDE_AGENT_ID: orochi-head-general

  screen:
    name: orochi-head-general

  health:
    enabled: true
    interval: 60
    timeout: 5
    method: orochi_multiplexer-orochi_alive

  restart:
    policy: never
    max_retries: 0

  hooks:
    pre_start: []
    post_start: []
    pre_stop: []
    post_stop: []
