# Template: copy to ~/.scitex/orochi/agents/ and customize
# Orochi Head Agent (Deploy/CI) -- agent-container definition
# Launched via: scitex-orochi launch head deploy
# Or explicitly: scitex-orochi launch head deploy --agent-config agents/head-deploy.yaml
apiVersion: cld-agent/v1
kind: Agent
metadata:
  name: orochi-head-deploy
  labels:
    role: head
    team: orochi
    specialty: deploy
    orochi_machine: CHANGEME
    capabilities: docker,deployment,ci-cd,persistent-services
spec:
  orochi_runtime: claude-code
  orochi_model: sonnet
  workdir: ~/proj

  remote:
    host: CHANGEME_HOST
    user: CHANGEME_USER

  claude:
    channels: []
    flags:
      - --dangerously-skip-permissions
      - "--dangerously-load-development-channels server:scitex-orochi"
    session: continue

  orochi:
    enabled: true
    hosts:
      - CHANGEME_LAN_IP      # LAN IP (fast)
      - CHANGEME_DOMAIN      # domain (fallback)
    port: 8559
    token_env: SCITEX_OROCHI_TOKEN
    channels:
      - "#general"
      - "#deploy"
    heartbeat_interval: 60

  env:
    SCITEX_OROCHI_HOST: "CHANGEME_HUB_IP"
    SCITEX_OROCHI_PORT: "8559"
    SCITEX_OROCHI_AGENT: orochi-head-deploy  # matches metadata.name
    CLAUDE_AGENT_ROLE: head
    CLAUDE_AGENT_ID: orochi-head-deploy

  skills:
    required:
      - docker          # Container management
      - ci-cd           # CI/CD pipeline management

  screen:
    name: orochi-head-deploy

  health:
    enabled: true
    interval: 60
    timeout: 5
    method: orochi_multiplexer-orochi_alive

  restart:
    policy: on-failure
    max_retries: 3
    backoff:
      initial: 30
      max: 300
      multiplier: 2

  hooks:
    pre_start: []
    post_start: []
    pre_stop: []
    post_stop: []
