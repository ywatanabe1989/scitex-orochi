# Template: copy to ~/.scitex/orochi/agents/ and customize
# Orochi Master Agent -- agent-container definition
# Launched via: scitex-orochi launch master
# Auto-discovered from agents/master.yaml (no --agent-config needed)
apiVersion: cld-agent/v1
kind: Agent
metadata:
  name: orochi-master
  labels:
    role: master
    team: orochi
    orochi_machine: CHANGEME
    capabilities: telegram,delegation,orchestration
spec:
  runtime: claude-code
  model: opus[1m]
  workdir: ~/proj

  claude:
    channels: []
    flags:
      - --dangerously-skip-permissions
      - "--dangerously-load-development-channels server:scitex-orochi"
    session: new

  skills:
    required:
      - orchestration  # Task delegation and coordination

  orochi:
    enabled: true
    hosts:
      - CHANGEME_LAN_IP      # LAN IP (fast)
      - CHANGEME_DOMAIN      # domain (fallback)
    port: 8559
    token_env: SCITEX_OROCHI_TOKEN
    channels:
      - "#general"
      - "#deploy"
      - "#research"
    heartbeat_interval: 60

  env:
    SCITEX_OROCHI_HOST: "CHANGEME_HUB_IP"
    SCITEX_OROCHI_PORT: "8559"
    SCITEX_OROCHI_AGENT: orochi-master  # matches metadata.name
    CLAUDE_AGENT_ROLE: master
    CLAUDE_AGENT_ID: orochi-master

  screen:
    name: orochi-master

  health:
    enabled: true
    interval: 30
    timeout: 5
    method: multiplexer-alive

  restart:
    policy: on-failure
    max_retries: 3
    backoff:
      initial: 30
      max: 300
      multiplier: 2

  hooks:
    pre_start: []
    post_start: []
    pre_stop: []
    post_stop: []
