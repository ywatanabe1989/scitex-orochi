# Orochi Dev Instance — Django + Daphne
# Port: 8560 (HTTP + WebSocket via ASGI)
# Volume: /data/orochi-dev/

services:
  orochi-dev:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    container_name: orochi-server-dev
    ports:
      - "8560:8559"
    volumes:
      - /data/orochi-dev:/data
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-key}
      - DJANGO_DEBUG=true
      - DJANGO_ALLOWED_HOSTS=orochi-dev.scitex.ai,localhost
      - OROCHI_DB_PATH=/data/db.sqlite3
    restart: unless-stopped
    networks:
      - scitex-cloud-prod_scitex-network

networks:
  scitex-cloud-prod_scitex-network:
    external: true
