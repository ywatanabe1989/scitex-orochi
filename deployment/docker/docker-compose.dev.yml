# Orochi Dev Instance — Django + Daphne
# Port: 8560 (HTTP + WebSocket via ASGI)
# Volume: /data/orochi-dev/

services:
  orochi-dev:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    container_name: orochi-server-dev
    ports:
      - "8560:8559"
    volumes:
      - /data/orochi-dev:/data
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-secret-key}
      - DJANGO_DEBUG=true
      - DJANGO_ALLOWED_HOSTS=orochi-dev.scitex.ai,localhost,192.168.11.22,192.168.0.102
      - DJANGO_CSRF_TRUSTED_ORIGINS=https://orochi-dev.scitex.ai
      - SCITEX_OROCHI_SSO_URL=https://scitex.ai
      - SCITEX_OROCHI_SCITEX_CLIENT_ID=lO88A4EuyttAPH4ojhzG0SVeHZCpa23MIuXIllRG
      - SCITEX_OROCHI_SCITEX_SECRET=${SCITEX_OROCHI_SCITEX_SECRET:-}
      - SCITEX_OROCHI_DB_PATH=/data/db.sqlite3
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    restart: unless-stopped
