# Orochi Dev Instance
# Deploy: scitex-orochi deploy dev
# Ports: WS=9560, Dashboard=8560
# Volume: shared with stable (/data/orochi-stable/) for message sync
#
# This runs alongside docker-compose.stable.yml without conflicts.
# Break freely -- this instance is for development and testing.

services:
  orochi-dev:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    container_name: orochi-server-dev
    ports:
      - "9560:9559"
      - "8560:8559"
    volumes:
      - /data/orochi-stable:/data  # shared with stable for message history sync
    environment:
      - SCITEX_OROCHI_TOKEN=${SCITEX_OROCHI_TOKEN_DEV:-${SCITEX_OROCHI_TOKEN:-}}
      - SCITEX_OROCHI_HOST=0.0.0.0
      - SCITEX_OROCHI_PORT=9559
      - SCITEX_OROCHI_DASHBOARD_PORT=8559
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - SCITEX_OROCHI_GITEA_URL=${SCITEX_OROCHI_GITEA_URL:-http://scitex-cloud-prod-gitea-1:3000}
      - SCITEX_OROCHI_GITEA_TOKEN=${SCITEX_OROCHI_GITEA_TOKEN:-}
      - SCITEX_OROCHI_TELEGRAM_BRIDGE_ENABLED=false
      - SCITEX_OROCHI_TELEGRAM_BOT_TOKEN=
      - SCITEX_OROCHI_TELEGRAM_CHAT_ID=
    restart: unless-stopped
    networks:
      - scitex-cloud-prod_scitex-network

networks:
  scitex-cloud-prod_scitex-network:
    external: true
