# Orochi Stable Instance (Production) — Django + Daphne
# Port: 8559 (HTTP + WebSocket via ASGI)
# Volume: /data/orochi-stable/

services:
  orochi:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    container_name: orochi-server-stable
    ports:
      - "8559:8559"
    volumes:
      - /data/orochi-stable:/data
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-change-me-in-production}
      - DJANGO_DEBUG=false
      - SCITEX_OROCHI_VERSION=${SCITEX_OROCHI_VERSION:-}
      - DJANGO_ALLOWED_HOSTS=.scitex-orochi.com,localhost,192.168.11.22,192.168.0.102
      - SCITEX_OROCHI_MEDIA_ROOT=/data/media
      - DJANGO_CSRF_TRUSTED_ORIGINS=https://*.scitex-orochi.com,https://scitex-orochi.com
      - SCITEX_OROCHI_BASE_DOMAIN=scitex-orochi.com
      - SESSION_COOKIE_DOMAIN=.scitex-orochi.com
      - CSRF_COOKIE_DOMAIN=.scitex-orochi.com
      - SCITEX_OROCHI_SSO_URL=https://scitex.ai
      - SCITEX_OROCHI_SCITEX_CLIENT_ID=lO88A4EuyttAPH4ojhzG0SVeHZCpa23MIuXIllRG
      - SCITEX_OROCHI_SCITEX_SECRET=5F0RC68GUZmAvPsaCPF6FUe62NYmscw4Kz5kNq1cDvSzcjpD-7QS-g
      - SCITEX_OROCHI_DB_PATH=/data/db.sqlite3
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME:-admin}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD:-}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL:-admin@orochi.local}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - SCITEX_OROCHI_TELEGRAM_WEBHOOK_SECRET=${SCITEX_OROCHI_TELEGRAM_WEBHOOK_SECRET:-}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-ea0d615449c4f6b2d923aecf10a848dc05b0a42a0d7bec38718b498f36f0646e}
      - GITHUB_WEBHOOK_CHANNEL=${GITHUB_WEBHOOK_CHANNEL:-#progress}
      - SCITEX_OROCHI_HOSTNAME=${SCITEX_OROCHI_HOSTNAME:-}
      - SCITEX_OROCHI_EXTERNAL_IP=${SCITEX_OROCHI_EXTERNAL_IP:-}
      - SCITEX_OROCHI_VAPID_PUBLIC=${SCITEX_OROCHI_VAPID_PUBLIC:-BGVEsgdHfACh73KPGx0bJiJn00gszfQxmluH48TYUMNDi7QBd0CXWUL43IG91ZOMD8qpGxsMlcAWTx8NRpzrDbA}
      - SCITEX_OROCHI_VAPID_PRIVATE=${SCITEX_OROCHI_VAPID_PRIVATE:-XY8CfHkIGYUB3U5v9dlB3xbORKTZwwzjeDXIrREuA4w}
      - SCITEX_OROCHI_VAPID_SUBJECT=${SCITEX_OROCHI_VAPID_SUBJECT:-mailto:noreply@scitex-orochi.com}
    restart: unless-stopped
