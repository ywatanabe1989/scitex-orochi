# Orochi Stable Instance (Production)
# Ports: WS=9559, Dashboard=8559
# Volume: /data/orochi-stable/
#
# Admin token: auto-generated at startup if not set.
# To persist it, set SCITEX_OROCHI_ADMIN_TOKEN in the environment
# or create /data/orochi-stable/.env with:
#   SCITEX_OROCHI_ADMIN_TOKEN=your-token-here

services:
  orochi:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    container_name: orochi-server-stable
    ports:
      - "9559:9559"
      - "8559:8559"
    volumes:
      - /data/orochi-stable:/data
    environment:
      - SCITEX_OROCHI_ADMIN_TOKEN=${SCITEX_OROCHI_ADMIN_TOKEN:-}
      - SCITEX_OROCHI_CORS_ORIGINS=https://orochi-dev.scitex.ai
      - SCITEX_OROCHI_HOST=0.0.0.0
      - SCITEX_OROCHI_PORT=9559
      - SCITEX_OROCHI_DASHBOARD_PORT=8559
      - SCITEX_OROCHI_GITEA_URL=${SCITEX_OROCHI_GITEA_URL:-http://scitex-cloud-prod-gitea-1:3000}
      - SCITEX_OROCHI_TELEGRAM_BRIDGE_ENABLED=true
      - SCITEX_OROCHI_TELEGRAM_BOT_TOKEN=${SCITEX_NOTIFICATION_TELEGRAM_TOKEN:-}
      - SCITEX_OROCHI_TELEGRAM_CHAT_ID=${SCITEX_NOTIFICATION_TELEGRAM_CHAT_ID:-}
    restart: unless-stopped
    networks:
      - scitex-cloud-prod_scitex-network

networks:
  scitex-cloud-prod_scitex-network:
    external: true
