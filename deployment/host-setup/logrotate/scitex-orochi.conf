# logrotate drop-in for ~/.scitex/orochi/** log files
# Install: sudo cp this file /etc/logrotate.d/scitex-orochi
# Verify:  sudo logrotate -d /etc/logrotate.d/scitex-orochi
# Closes:  scitex-orochi#138

# fleet-watch log: ~260 KB/day, no SIGHUP support → copytruncate
/home/ywatanabe/.scitex/orochi/fleet-watch/*.log {
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}

